<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的淘宝 - 设置</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_4000000_1.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        .taobao-header {
            background: linear-gradient(135deg, #ff5000 0%, #ff6a00 100%);
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .taobao-header h1 {
            font-size: 18px;
            font-weight: 500;
        }
        .settings-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }
        .settings-nav {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .settings-nav ul {
            list-style: none;
            display: flex;
            gap: 24px;
        }
        .settings-nav a {
            text-decoration: none;
            color: #666;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .settings-nav a.active {
            background: #ff5000;
            color: white;
        }
        .settings-content {
            background: white;
            border-radius: 8px;
            padding: 24px;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
